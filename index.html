<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Doter — interactive dot matrix viewer</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='8' cy='8' r='3' fill='%235eaaef'/><circle cx='16' cy='16' r='3' fill='%235eaaef'/><circle cx='24' cy='24' r='3' fill='%235eaaef'/></svg>"/>
  <link rel="stylesheet" href="./styles.css"/>
</head>
<body>

<header class="topbar">
  <h1>Doter</h1>
  <span class="muted">Interactive dot matrix viewer · <a href="https://toki-bio.github.io/doter/">toki-bio.github.io/doter</a></span>
</header>

<main class="app">

  <!-- ─── input panel ──────────────────────────────────────── -->
  <section class="panel card">
    <div class="seq-grid">
      <label><span>Sequence A</span>
        <textarea id="seqA" spellcheck="false">>seqA
ACGTTGACCTGAAACCGTTACGTTGACCTGAAACCGTTACGTTGACC</textarea>
      </label>
      <label><span>Sequence B</span>
        <textarea id="seqB" spellcheck="false">>seqB
ACGTTGACCTGAAGCCGTTACGTCGACCTGAAACCGTTACGTTGACC</textarea>
      </label>
    </div>

    <div class="toolbar">
      <button id="renderBtn">Render</button>
      <button id="recalcBtn" class="ghost">Recalculate</button>

      <label><span>Window</span>
        <input id="windowSize" type="range" min="1" max="61" step="2" value="9"/>
        <output id="windowSizeValue">9</output>
      </label>

      <label><span>Threshold</span>
        <input id="threshold" type="range" min="0" max="100" step="1" value="55"/>
        <output id="thresholdValue">55</output>
      </label>

      <label><span>Zoom</span>
        <input id="zoomLevel" type="range" min="1" max="24" step="1" value="1"/>
        <output id="zoomLevelValue">1×</output>
      </label>

      <label><span>Mode</span>
        <select id="scoreMode">
          <option value="identity">Identity</option>
          <option value="dna-simple">DNA +1/−1</option>
        </select>
      </label>
    </div>

    <div class="toolbar secondary">
      <label><input id="reverseB" type="checkbox"/><span>RevComp B</span></label>
      <label><input id="showTrace" type="checkbox" checked/><span>Diagonal trace</span></label>
      <button id="fitViewBtn" class="ghost">Fit</button>
      <button id="exportPngBtn" class="ghost">PNG</button>
      <button id="exportSvgBtn" class="ghost">SVG</button>
      <button id="exampleBtn" class="ghost">Example</button>
    </div>
  </section>

  <!-- ─── viewer ───────────────────────────────────────────── -->
  <section class="viewer card">
    <div class="viewer-bar">
      <p id="statusLine" class="status-fixed">Ready.</p>
      <p id="hoverInfo" class="hover-fixed">&nbsp;</p>
    </div>

    <div id="dropZone" class="drop-zone">Drop FASTA file(s) here</div>

    <div class="canvas-shell">
      <div id="canvasViewport" class="canvas-viewport">
        <div id="canvasStage" class="canvas-stage">
          <canvas id="plotCanvas"></canvas>
          <canvas id="overlayCanvas"></canvas>
        </div>
      </div>
    </div>

    <div class="align-box">
      <p id="alignmentMeta" class="align-meta">&nbsp;</p>
      <pre id="alignmentPanel" class="align-pre">A: —
   
B: —</pre>
    </div>
  </section>

</main>

<script src="./src/app.js"></script>
</body>
</html>
